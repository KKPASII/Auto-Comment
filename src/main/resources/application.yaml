spring:
  application:
    name: autocomment
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

http:
  client:
    connect-timeout: 3s
    read-timeout: 30s

openai:
  api-key: ${OPENAI_API_KEY}
  api-url: https://api.openai.com/v1/chat/completions
  model: gpt-4o-mini

github:
  token: ${GITHUB_TOKEN}
  api-url: https://api.github.com
  base-url: https://github.com/
  review-branch: auto-comment-logs
  temperature: 0.2
